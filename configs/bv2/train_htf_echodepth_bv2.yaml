# BV2 paper-style training config for HTF-EchoDepth
experiment_name: htf_echodepth_bv2

model:
  name: HTF-EchoDepth
  input_channels: 2
  output_channels: 1
  depth_normalize: true

dataset:
  name: bv2
  max_depth_m: 30.0
  valid_min_depth_m: 0.5
  image_size: 256
  train_index: indices/train_index.csv
  val_index: indices/val_index.csv
  test_index: indices/test_index.csv

training:
  epochs: 80
  batch_size: 32
  optimizer: AdamW
  learning_rate: 0.0003
  weight_decay: 0.01
  seed: 42
  deterministic: true
  num_workers: 4

lr_scheduler:
  name: cosine_warmup
  warmup_epochs: 3
  min_lr: 0.00005

loss:
  name: l1_plus_log_ratio_hinge
  lambda_lrh: 0.003

checkpoint:
  output_dir: outputs/bv2/train
  selection_split: val
  save_best_rmse: true
  save_best_rel: true
  save_best_log10: true
  save_best_delta1: true
  save_best_delta2: true
  save_best_delta3: true
  save_best_wbrs: true
  save_last: true

metrics:
  protocol: valid_depth
  valid_min_depth_m: 0.5
  max_depth_m: 30.0

wbrs:
  reference_metrics:
    RMSE: 2.413
    REL: 0.466
    LOG10: 0.190
    DELTA1: 0.444
    DELTA2: 0.646
    DELTA3: 0.771
